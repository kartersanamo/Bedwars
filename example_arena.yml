    world: bedwars_world
    x: 0.5
    y: 65.0
    z: 32.5
    yaw: 0.0
    pitch: 0.0
  d2:
    world: bedwars_world
    x: 0.5
    y: 65.0
    z: -32.5
    yaw: 0.0
    pitch: 0.0

